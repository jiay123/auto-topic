name: 每日選題推送

on:
  schedule:
    - cron: '0 1 * * 1-5'
    - cron: '0 7 * * 1-5'
  workflow_dispatch:

jobs:
  fetch-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests
      - run: python scripts/fetch_topics.py
        env:
          SENDKEY: ${{ secrets.SENDKEY }}
