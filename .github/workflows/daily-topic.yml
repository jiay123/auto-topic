name: 每日推送

on:
  schedule:
    - cron: '0 1 * * *'
    - cron: '0 7 * * *'
  workflow_dispatch:

jobs:
  morning-topics:
    if: ${{ github.event.schedule == '0 1 * * *' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: actions/cache@v4
        with:
          path: state_topics.json
          key: topics-state-${{ github.run_id }}
          restore-keys: topics-state-
      - run: pip install requests
      - run: python scripts/fetch_topics.py
        env:
          SENDKEY: ${{ secrets.SENDKEY }}

  evening-tips:
    if: ${{ github.event.schedule == '0 7 * * *' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: actions/cache@v4
        with:
          path: state_topics.json
          key: evening-morning-${{ github.run_id }}
          restore-keys: topics-state-
      - run: pip install requests
      - run: python scripts/fetch_evening_tip.py
        env:
          SENDKEY: ${{ secrets.SENDKEY }}
