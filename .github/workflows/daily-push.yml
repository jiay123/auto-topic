name: 每日推送

on:
  schedule:
    # 07:00 北京时间 = 23:00 UTC
    - cron: '0 23 * * *'
    # 08:00 北京时间 = 00:00 UTC
    - cron: '0 0 * * *'
    # 12:00 北京时间 = 04:00 UTC
    - cron: '0 4 * * *'
    # 15:00 北京时间 = 07:00 UTC
    - cron: '0 7 * * *'
  workflow_dispatch:

jobs:
  ai-news:
    if: ${{ github.event.schedule == '0 23 * * *' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests
      - run: python scripts/fetch_ai_news.py
        env:
          SENDKEY: ${{ secrets.SENDKEY }}

  github-projects:
    if: ${{ github.event.schedule == '0 0 * * *' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests
      - run: python scripts/fetch_github_projects.py
        env:
          SENDKEY: ${{ secrets.SENDKEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
      - name: 提交状态文件（去重+热门轮转持久化）
        run: |
          git config user.email "bot@auto-topic.local"
          git config user.name "auto-topic-bot"
          git add recommended_history.json hot_rotation.json
          git commit -m "chore: 更新推荐状态 $(date +%F)" || echo "no changes"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  planet-content:
    if: ${{ github.event.schedule == '0 4 * * *' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: actions/cache/restore@v4
        with:
          path: state_github_projects.json
          key: github-projects-state
      - run: pip install requests
      - run: python scripts/fetch_planet_content.py
        env:
          SENDKEY: ${{ secrets.SENDKEY }}

  daily-review:
    if: ${{ github.event.schedule == '0 7 * * *' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests
      - run: python scripts/fetch_daily_review.py
        env:
          SENDKEY: ${{ secrets.SENDKEY }}
