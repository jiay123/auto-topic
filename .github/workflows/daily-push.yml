name: 每日推送

on:
  schedule:
    # 08:00 北京时间 = 00:00 UTC
    - cron: '0 0 * * *'
    # 09:00 北京时间 = 01:00 UTC
    - cron: '0 1 * * *'
    # 11:00 北京时间 = 03:00 UTC
    - cron: '0 3 * * *'
    # 15:00 北京时间 = 07:00 UTC
    - cron: '0 7 * * *'
    # 17:00 北京时间 = 09:00 UTC
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  ai-news:
    if: ${{ github.event.schedule == '0 0 * * *' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests cryptography nacl
      - run: python scripts/fetch_ai_news.py
        env:
          SENDKEY: ${{ secrets.SENDKEY }}

  github-projects:
    if: ${{ github.event.schedule == '0 1 * * *' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: actions/cache@v4
        with:
          path: state_github.json
          key: github-projects-state
      - run: pip install requests
      - run: python scripts/fetch_github_projects.py
        env:
          SENDKEY: ${{ secrets.SENDKEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

  article-pick:
    if: ${{ github.event.schedule == '0 3 * * *' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests
      - run: python scripts/fetch_article_pick.py
        env:
          SENDKEY: ${{ secrets.SENDKEY }}

  planet-content:
    if: ${{ github.event.schedule == '0 7 * * *' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests
      - run: python scripts/fetch_planet_content.py
        env:
          SENDKEY: ${{ secrets.SENDKEY }}

  daily-review:
    if: ${{ github.event.schedule == '0 9 * * *' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests
      - run: python scripts/fetch_daily_review.py
        env:
          SENDKEY: ${{ secrets.SENDKEY }}